<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" role="img" aria-label="採用データ分析ダッシュボードのモックアップ">
  <defs>
    <linearGradient id="lp4-area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#06B6D4" stop-opacity=".55"/>
      <stop offset="1" stop-color="#06B6D4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lp4-area2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38BDF8" stop-opacity=".35"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lp4-bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#06B6D4"/>
      <stop offset="1" stop-color="#0891B2"/>
    </linearGradient>
  </defs>

  <rect width="720" height="520" fill="#fff"/>

  <!-- 上部：KPI 帯 -->
  <g transform="translate(20 20)">
    <rect x="0" y="0" width="160" height="80" rx="12" fill="#F1F5F9"/>
    <text x="14" y="22" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#64748B" letter-spacing="2">APPLICATIONS</text>
    <text x="14" y="50" font-family="DM Sans, sans-serif" font-size="26" font-weight="800" fill="#0F172A">1,284</text>
    <text x="14" y="70" font-family="DM Sans, sans-serif" font-size="11" font-weight="700" fill="#06B6D4">+12.4% vs prev</text>

    <rect x="170" y="0" width="160" height="80" rx="12" fill="#F1F5F9"/>
    <text x="184" y="22" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#64748B" letter-spacing="2">CPA</text>
    <text x="184" y="50" font-family="DM Sans, sans-serif" font-size="26" font-weight="800" fill="#0F172A">¥4,820</text>
    <text x="184" y="70" font-family="DM Sans, sans-serif" font-size="11" font-weight="700" fill="#06B6D4">-31.2%</text>

    <rect x="340" y="0" width="160" height="80" rx="12" fill="#F1F5F9"/>
    <text x="354" y="22" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#64748B" letter-spacing="2">HIRE RATE</text>
    <text x="354" y="50" font-family="DM Sans, sans-serif" font-size="26" font-weight="800" fill="#0F172A">8.6%</text>
    <text x="354" y="70" font-family="DM Sans, sans-serif" font-size="11" font-weight="700" fill="#06B6D4">+1.8pt</text>

    <rect x="510" y="0" width="160" height="80" rx="12" fill="#0F172A"/>
    <text x="524" y="22" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#67E8F9" letter-spacing="2">SAVED / MO</text>
    <text x="524" y="50" font-family="DM Sans, sans-serif" font-size="26" font-weight="800" fill="#fff">¥1.42M</text>
    <text x="524" y="70" font-family="DM Sans, sans-serif" font-size="11" font-weight="700" fill="#67E8F9">3-month avg</text>
  </g>

  <!-- 中央：複合チャート -->
  <g transform="translate(20 120)">
    <rect x="0" y="0" width="450" height="220" rx="12" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="14" y="22" font-family="JetBrains Mono, monospace" font-size="10" fill="#64748B" letter-spacing="2">3-MONTH TREND</text>
    <text x="14" y="42" font-family="DM Sans, sans-serif" font-size="14" font-weight="800" fill="#0F172A">応募数 × CPA の推移</text>

    <!-- 軸 -->
    <line x1="40" y1="180" x2="430" y2="180" stroke="#CBD5E1"/>
    <line x1="40" y1="60" x2="430" y2="60" stroke="#E2E8F0" stroke-dasharray="2 4"/>
    <line x1="40" y1="120" x2="430" y2="120" stroke="#E2E8F0" stroke-dasharray="2 4"/>

    <!-- エリア（応募数：上昇） -->
    <path d="M 40 150 L 90 130 L 140 110 L 190 100 L 240 80 L 290 70 L 340 65 L 390 55 L 430 50 L 430 180 L 40 180 Z" fill="url(#lp4-area)"/>
    <path d="M 40 150 L 90 130 L 140 110 L 190 100 L 240 80 L 290 70 L 340 65 L 390 55 L 430 50" fill="none" stroke="#06B6D4" stroke-width="2.5"/>
    <g fill="#06B6D4">
      <circle cx="40" cy="150" r="3"/><circle cx="90" cy="130" r="3"/><circle cx="140" cy="110" r="3"/><circle cx="190" cy="100" r="3"/>
      <circle cx="240" cy="80" r="3"/><circle cx="290" cy="70" r="3"/><circle cx="340" cy="65" r="3"/><circle cx="390" cy="55" r="3"/><circle cx="430" cy="50" r="4"/>
    </g>

    <!-- 第二系列 CPA下降 (破線) -->
    <path d="M 40 80 L 90 90 L 140 100 L 190 110 L 240 130 L 290 145 L 340 155 L 390 160 L 430 165" fill="none" stroke="#0F172A" stroke-width="1.5" stroke-dasharray="3 3"/>

    <!-- ラベル -->
    <text x="430" y="46" font-family="DM Sans, sans-serif" font-size="11" fill="#06B6D4" font-weight="800" text-anchor="end">応募数 ↑</text>
    <text x="430" y="178" font-family="DM Sans, sans-serif" font-size="11" fill="#0F172A" font-weight="800" text-anchor="end">CPA ↓</text>

    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#64748B">
      <text x="40" y="200" text-anchor="middle">M-3</text>
      <text x="140" y="200" text-anchor="middle">M-1</text>
      <text x="240" y="200" text-anchor="middle">Now</text>
      <text x="340" y="200" text-anchor="middle">M+2</text>
      <text x="430" y="200" text-anchor="end">M+3</text>
    </g>
  </g>

  <!-- 右上：媒体別棒グラフ -->
  <g transform="translate(490 120)">
    <rect x="0" y="0" width="210" height="220" rx="12" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="14" y="22" font-family="JetBrains Mono, monospace" font-size="10" fill="#64748B" letter-spacing="2">BY CHANNEL</text>
    <text x="14" y="42" font-family="DM Sans, sans-serif" font-size="14" font-weight="800" fill="#0F172A">媒体別 寄与度</text>

    <g transform="translate(20 60)">
      <text x="0" y="14" font-family="DM Sans, sans-serif" font-size="10" fill="#64748B">媒体A</text>
      <rect x="50" y="4" width="120" height="14" rx="3" fill="#E2E8F0"/>
      <rect x="50" y="4" width="100" height="14" rx="3" fill="url(#lp4-bar)"/>
      <text x="170" y="14" font-family="DM Sans, sans-serif" font-size="10" font-weight="700" fill="#0F172A">38%</text>
    </g>
    <g transform="translate(20 84)">
      <text x="0" y="14" font-family="DM Sans, sans-serif" font-size="10" fill="#64748B">媒体B</text>
      <rect x="50" y="4" width="120" height="14" rx="3" fill="#E2E8F0"/>
      <rect x="50" y="4" width="84" height="14" rx="3" fill="url(#lp4-bar)"/>
      <text x="170" y="14" font-family="DM Sans, sans-serif" font-size="10" font-weight="700" fill="#0F172A">28%</text>
    </g>
    <g transform="translate(20 108)">
      <text x="0" y="14" font-family="DM Sans, sans-serif" font-size="10" fill="#64748B">媒体C</text>
      <rect x="50" y="4" width="120" height="14" rx="3" fill="#E2E8F0"/>
      <rect x="50" y="4" width="55" height="14" rx="3" fill="url(#lp4-bar)" opacity=".7"/>
      <text x="170" y="14" font-family="DM Sans, sans-serif" font-size="10" font-weight="700" fill="#0F172A">18%</text>
    </g>
    <g transform="translate(20 132)">
      <text x="0" y="14" font-family="DM Sans, sans-serif" font-size="10" fill="#64748B">媒体D</text>
      <rect x="50" y="4" width="120" height="14" rx="3" fill="#E2E8F0"/>
      <rect x="50" y="4" width="32" height="14" rx="3" fill="url(#lp4-bar)" opacity=".5"/>
      <text x="170" y="14" font-family="DM Sans, sans-serif" font-size="10" font-weight="700" fill="#0F172A">10%</text>
    </g>
    <g transform="translate(20 156)">
      <text x="0" y="14" font-family="DM Sans, sans-serif" font-size="10" fill="#64748B">媒体E</text>
      <rect x="50" y="4" width="120" height="14" rx="3" fill="#E2E8F0"/>
      <rect x="50" y="4" width="18" height="14" rx="3" fill="#FB7185" opacity=".7"/>
      <text x="170" y="14" font-family="DM Sans, sans-serif" font-size="10" font-weight="700" fill="#FB7185">6%</text>
    </g>

    <g transform="translate(20 188)">
      <text x="0" y="0" font-family="JetBrains Mono, monospace" font-size="9" fill="#64748B">⚠ 停止候補：媒体E</text>
    </g>
  </g>

  <!-- 下段：ヒートマップ風 -->
  <g transform="translate(20 360)">
    <rect x="0" y="0" width="680" height="140" rx="12" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="14" y="22" font-family="JetBrains Mono, monospace" font-size="10" fill="#64748B" letter-spacing="2">JOB × WEEK HEATMAP</text>
    <text x="14" y="42" font-family="DM Sans, sans-serif" font-size="14" font-weight="800" fill="#0F172A">職種 × 週 ヒートマップ（応募率）</text>

    <g transform="translate(80 60)">
      <!-- 行ラベル -->
      <g font-family="JetBrains Mono, monospace" font-size="10" fill="#64748B">
        <text x="-10" y="14" text-anchor="end">職種A</text>
        <text x="-10" y="34" text-anchor="end">職種B</text>
        <text x="-10" y="54" text-anchor="end">職種C</text>
      </g>
      <!-- セル -->
      <g>
        <rect x="0" y="2" width="40" height="16" rx="3" fill="#06B6D4" opacity=".9"/>
        <rect x="44" y="2" width="40" height="16" rx="3" fill="#06B6D4" opacity=".7"/>
        <rect x="88" y="2" width="40" height="16" rx="3" fill="#06B6D4" opacity=".5"/>
        <rect x="132" y="2" width="40" height="16" rx="3" fill="#06B6D4" opacity=".95"/>
        <rect x="176" y="2" width="40" height="16" rx="3" fill="#06B6D4" opacity=".4"/>
        <rect x="220" y="2" width="40" height="16" rx="3" fill="#06B6D4" opacity=".75"/>
        <rect x="264" y="2" width="40" height="16" rx="3" fill="#06B6D4" opacity=".55"/>
        <rect x="308" y="2" width="40" height="16" rx="3" fill="#06B6D4" opacity=".85"/>
        <rect x="352" y="2" width="40" height="16" rx="3" fill="#06B6D4" opacity=".65"/>
        <rect x="396" y="2" width="40" height="16" rx="3" fill="#06B6D4" opacity=".7"/>
        <rect x="440" y="2" width="40" height="16" rx="3" fill="#06B6D4" opacity=".88"/>
        <rect x="484" y="2" width="40" height="16" rx="3" fill="#06B6D4" opacity=".55"/>
      </g>
      <g transform="translate(0 22)">
        <rect x="0" y="0" width="40" height="16" rx="3" fill="#0EA5E9" opacity=".5"/>
        <rect x="44" y="0" width="40" height="16" rx="3" fill="#0EA5E9" opacity=".7"/>
        <rect x="88" y="0" width="40" height="16" rx="3" fill="#0EA5E9" opacity=".95"/>
        <rect x="132" y="0" width="40" height="16" rx="3" fill="#0EA5E9" opacity=".55"/>
        <rect x="176" y="0" width="40" height="16" rx="3" fill="#0EA5E9" opacity=".4"/>
        <rect x="220" y="0" width="40" height="16" rx="3" fill="#0EA5E9" opacity=".8"/>
        <rect x="264" y="0" width="40" height="16" rx="3" fill="#0EA5E9" opacity=".6"/>
        <rect x="308" y="0" width="40" height="16" rx="3" fill="#0EA5E9" opacity=".75"/>
        <rect x="352" y="0" width="40" height="16" rx="3" fill="#0EA5E9" opacity=".5"/>
        <rect x="396" y="0" width="40" height="16" rx="3" fill="#0EA5E9" opacity=".4"/>
        <rect x="440" y="0" width="40" height="16" rx="3" fill="#0EA5E9" opacity=".68"/>
        <rect x="484" y="0" width="40" height="16" rx="3" fill="#0EA5E9" opacity=".88"/>
      </g>
      <g transform="translate(0 44)">
        <rect x="0" y="0" width="40" height="16" rx="3" fill="#38BDF8" opacity=".7"/>
        <rect x="44" y="0" width="40" height="16" rx="3" fill="#38BDF8" opacity=".4"/>
        <rect x="88" y="0" width="40" height="16" rx="3" fill="#38BDF8" opacity=".55"/>
        <rect x="132" y="0" width="40" height="16" rx="3" fill="#38BDF8" opacity=".75"/>
        <rect x="176" y="0" width="40" height="16" rx="3" fill="#38BDF8" opacity=".95"/>
        <rect x="220" y="0" width="40" height="16" rx="3" fill="#38BDF8" opacity=".6"/>
        <rect x="264" y="0" width="40" height="16" rx="3" fill="#38BDF8" opacity=".75"/>
        <rect x="308" y="0" width="40" height="16" rx="3" fill="#38BDF8" opacity=".4"/>
        <rect x="352" y="0" width="40" height="16" rx="3" fill="#38BDF8" opacity=".88"/>
        <rect x="396" y="0" width="40" height="16" rx="3" fill="#38BDF8" opacity=".55"/>
        <rect x="440" y="0" width="40" height="16" rx="3" fill="#38BDF8" opacity=".7"/>
        <rect x="484" y="0" width="40" height="16" rx="3" fill="#38BDF8" opacity=".5"/>
      </g>
      <g font-family="JetBrains Mono, monospace" font-size="8" fill="#94A3B8" transform="translate(0 78)">
        <text x="20" y="0" text-anchor="middle">W1</text>
        <text x="108" y="0" text-anchor="middle">W3</text>
        <text x="240" y="0" text-anchor="middle">W6</text>
        <text x="372" y="0" text-anchor="middle">W9</text>
        <text x="504" y="0" text-anchor="middle">W12</text>
      </g>
    </g>
  </g>
</svg>
